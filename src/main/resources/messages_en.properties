# English strings (explicit locale file so Locale.ENGLISH resolves here
# deterministically instead of falling through to messages_<defaultLocale>).
# Mirrors messages.properties (the language-neutral default).
# Patterns use java.text.MessageFormat syntax ({0}, {1}, ...).
# A literal single quote must be doubled ('').

game.started = === THE GAME BEGINS ===
game.ended = \n=== GAME ENDED ===
game.winner = Winner is: {0}

round.header = \n===== ROUND =====
round.dealer = Dealer: {0}
round.hand = {0} hand: {1}
round.end = \n--- End of Round ---
round.loser = Loser: {0}
round.eliminated = >>> {0} KICKED OUT from game (no more trumps) <<<

scoreboard.header = Scoreboard:
scoreboard.push = To scoreboard {0} pushed: {1}

event.card_played =   {0} moves: {1}
event.card_beaten =   {0} beat {1} by card {2}
event.pot_taken =   {0} can''t beat {1} -> take pot ({2} cards)

prompt.your_cards = \n{0} your cards:
prompt.card_index =   {0}) {1}
prompt.choose_lead = Choose card to move (1-{0}): 
prompt.choose_beat = Choose card to beat (1-{0}): 
prompt.can_beat = \n{0} can beat {1} one of cards:
prompt.invalid = Invalid input. Try again.
