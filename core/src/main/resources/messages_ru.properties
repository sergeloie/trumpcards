card.suit.spades = пик
card.suit.clubs = треф
card.suit.diamonds = бубён
card.suit.hearts = червей
# Символы мастей (интернациональные, для GUI / мобильного)
card.suit.spades.symbol = \u2660
card.suit.clubs.symbol = \u2663
card.suit.diamonds.symbol = \u2666
card.suit.hearts.symbol = \u2665
# Названия рангов
card.rank.six = Шестёрка
card.rank.seven = Семёрка
card.rank.eight = Восьмёрка
