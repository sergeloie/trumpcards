# Russian strings for the console presentation layer.
# Patterns use java.text.MessageFormat syntax ({0}, {1}, ...).

game.started = === ИГРА НАЧИНАЕТСЯ ===
game.ended = \n=== ИГРА ОКОНЧЕНА ===
game.winner = Победитель: {0}

round.header = \n===== РАУНД =====
round.dealer = Раздающий: {0}
round.hand = Рука {0}: {1}
round.end = \n--- Конец раунда ---
round.loser = Проигравший: {0}
round.eliminated = >>> {0} ВЫЛЕТЕЛ из игры (закончились козыри) <<<

scoreboard.header = Табло:
scoreboard.push = В табло {0} добавлено: {1}

event.card_played =   {0} ходит: {1}
event.card_beaten =   {0} бьёт {1} картой {2}
event.pot_taken =   {0} не может побить {1} -> забирает банк ({2} карт)

prompt.your_cards = \n{0} ваши карты:
prompt.card_index =   {0}) {1}
prompt.choose_lead = Выберите карту для хода (1-{0}): 
prompt.choose_beat = Выберите карту для отбоя (1-{0}): 
prompt.can_beat = \n{0} может побить {1} одной из карт:
prompt.invalid = Неверный ввод. Попробуйте снова.

# ---- Локализация карт (используется CardLocalizer) ----
